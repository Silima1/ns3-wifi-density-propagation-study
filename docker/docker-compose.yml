services:
  wn-analysis:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    image: ns3-wifi-performance-analysis:latest

    container_name: ns3-wifi-analysis

    working_dir: /workspace

    environment:
      PROJECT_ROOT: /workspace
      MPLBACKEND: Agg
      PYTHONUNBUFFERED: "1"

    volumes:
      - ..:/workspace

    command:
      - final

    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"